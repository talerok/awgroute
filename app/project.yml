name: AwgRoute
options:
  bundleIdPrefix: dev.awgroute
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"          # ad-hoc
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_HARDENED_RUNTIME: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  AwgRouteShared:
    path: ../shared

targets:
  AwgRoute:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
      - path: ../resources/rule-presets
        type: folder
        buildPhase: resources
      # amnezia-box backend → AwgRoute.app/Contents/Resources/amnezia-box.
      # Без этого Paths.backendBinary() возвращает nil для bundle-сборки запущенной
      # вне репозитория (например из /Applications/), и UI показывает "Backend missing".
      # optional:true — разрешает первичную генерацию проекта до того как backend/build.sh
      # отработал (xcodegen иначе ругнётся на отсутствующий файл).
      - path: ../backend/amnezia-box
        optional: true
        buildPhase: resources
      # Helper-бинарь копируется в AwgRoute.app/Contents/Library/LaunchServices/awgroute-helper.
      # Это стандартное место для privileged helper'ов в .app-bundle. Установщик
      # (HelperInstaller.swift) копирует оттуда в /Library/PrivilegedHelperTools/.
      - path: ../helper/awgroute-helper
        optional: true
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchServices
      # Plist-template идёт в Resources — установщик читает и подставляет owner.
      - path: ../helper/com.awgroute.helper.plist.template
        buildPhase: resources
    preBuildScripts:
      - name: Build awgroute-helper
        # Собирает helper-бинарь до того, как Xcode попытается его скопировать в bundle.
        # outputFiles даёт Xcode'у знание о produced artifact для инкрементальных билдов.
        script: |
          set -euo pipefail
          cd "${SRCROOT}/../helper"
          ./build.sh
        outputFiles:
          - $(SRCROOT)/../helper/awgroute-helper
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: AwgRoute
        CFBundleDisplayName: AwgRoute
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "13.0"
        LSUIElement: false
        NSHumanReadableCopyright: ""
        NSAppleEventsUsageDescription: "AwgRoute needs to run amnezia-box with administrator privileges to bring up the VPN tunnel."
    dependencies:
      - package: AwgRouteShared
        product: AwgConfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.awgroute.app
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
